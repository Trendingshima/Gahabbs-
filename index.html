<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>تحويل أموال - مطابق للصورة</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 12px;
    }

    /* حاوية الجوال */
    .phone {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 44px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 8px #2c2c2c;
      overflow: hidden;
      aspect-ratio: 9 / 19;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen {
      flex: 1;
      background: white;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .screen.hidden {
      display: none;
    }

    /* شريط الحالة */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 16px 8px;
      font-size: 14px;
      font-weight: 590;
      color: #1c1c1e;
      background: white;
      border-bottom: 0.5px solid #e5e5ea;
    }

    /* حقول الإدخال في الشاشة الأولى */
    .input-group {
      margin-bottom: 20px;
    }

    .label {
      font-size: 14px;
      font-weight: 500;
      color: #3a3a3e;
      margin-bottom: 6px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 14px 14px;
      font-size: 17px;
      border: 1px solid #c6c6c8;
      border-radius: 12px;
      background: #f9f9fb;
      font-family: monospace;
    }

    .input-field:focus {
      outline: none;
      border-color: #007aff;
    }

    .btn-submit {
      background: #007aff;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      color: white;
      text-align: center;
      cursor: pointer;
      margin-top: 30px;
      width: 100%;
    }

    .btn-submit:active {
      background: #005fc1;
    }

    /* ========== الشاشة الثانية - مطابقة للصورة بالحرف ========== */
    .carrier-title {
      font-size: 20px;
      font-weight: 600;
      color: #000;
      margin-bottom: 18px;
    }

    .transfer-text {
      font-size: 18px;
      font-weight: 500;
      color: #000;
      line-height: 1.5;
      margin-bottom: 16px;
      background: #f2f2f7;
      padding: 14px;
      border-radius: 16px;
    }

    .phone-number {
      font-size: 24px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 0.5px;
      display: inline-block;
      margin: 2px 0;
    }

    .ussd-box {
      background: #f2f2f7;
      border-radius: 16px;
      padding: 14px;
      margin: 16px 0;
      font-size: 16px;
      font-weight: 500;
    }

    .ussd-code {
      font-size: 20px;
      font-weight: 700;
      font-family: monospace;
    }

    /* الأزرار بالضبط: Cancel رمادي بحد رمادي، Send أزرق */
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .btn-cancel {
      flex: 1;
      background: #e5e5ea;
      border: 1px solid #c6c6c8;
      padding: 14px 0;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 590;
      color: #007aff;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn-cancel:active {
      background: #d1d1d6;
    }

    .btn-send {
      flex: 1;
      background: #007aff;
      border: none;
      padding: 14px 0;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 590;
      color: white;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn-send:active {
      background: #005fc1;
    }

    .footer-note {
      font-size: 12px;
      color: #8e8e93;
      text-align: center;
      margin-top: 20px;
      border-top: 0.5px solid #e5e5ea;
      padding-top: 14px;
    }

    .small-text {
      font-size: 11px;
      color: #8e8e93;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 🔋 100%</span>
  </div>

  <!-- الشاشة الأولى: إدخال البيانات -->
  <div id="screen1" class="screen">
    <div style="margin-bottom: 20px;">
      <h2 style="font-size: 28px; font-weight: 700;">تحويل رصيد</h2>
      <p style="color: #6c6c70;">أدخل بيانات التحويل</p>
    </div>

    <div class="input-group">
      <label class="label">رقم الجوال</label>
      <input type="tel" id="phone" class="input-field" placeholder="مثال: 01012345678" dir="ltr">
    </div>

    <div class="input-group">
      <label class="label">المبلغ (جنيه)</label>
      <input type="number" id="amount" class="input-field" placeholder="15000" dir="ltr">
    </div>

    <div class="input-group">
      <label class="label">مصاريف الخدمة (جنيه)</label>
      <input type="number" id="fee" class="input-field" placeholder="0" dir="ltr">
    </div>

    <button id="confirmBtn" class="btn-submit">تم</button>
    <div class="small-text" style="text-align:center; margin-top:16px;">اضغط تم للانتقال للواجهة الثانية</div>
  </div>

  <!-- الشاشة الثانية: مطابقة للصورة بالكامل -->
  <div id="screen2" class="screen hidden">
    <div>
      <div class="carrier-title">Carrier info</div>

      <div id="transferDetails" class="transfer-text">
        <!-- هيتعبأ بالجافاسكريبت -->
      </div>

      <div class="ussd-box">
        اطلب <span class="ussd-code">*9#</span> و 0: مزيد
      </div>

      <div class="button-row">
        <div id="cancelBtn" class="btn-cancel">Cancel</div>
        <div id="sendBtn" class="btn-send">Send</div>
      </div>

      <div class="footer-note">
        مزيد من الخدمات: اطلب *9#
      </div>
    </div>
  </div>
</div>

<script>
  const screen1 = document.getElementById('screen1');
  const screen2 = document.getElementById('screen2');
  const confirmBtn = document.getElementById('confirmBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const sendBtn = document.getElementById('sendBtn');
  const transferDetails = document.getElementById('transferDetails');

  const phoneInput = document.getElementById('phone');
  const amountInput = document.getElementById('amount');
  const feeInput = document.getElementById('fee');

  // وظيفة تحديث الواجهة الثانية - بدون اي افتراضيات
  function updateSecondScreen() {
    let phone = phoneInput.value.trim();
    let amount = amountInput.value.trim();
    let fee = feeInput.value.trim();

    // لو الحقل فاضي يظهر فاضي (مفيش ارقام افتراضية)
    if (amount === "") amount = "";
    if (fee === "") fee = "";
    
    // بناء النص بالضبط زي الصورة
    let amountText = amount === "" ? "_____" : amount;
    let feeText = fee === "" ? "_____" : fee;
    let phoneText = phone === "" ? "__________" : phone;

    transferDetails.innerHTML = `
      تم تحويل ${amountText} جنيه لرقم<br>
      <span class="phone-number">${phoneText}</span><br>
      مصاريف الخدمة ${feeText} جنيه .
    `;
  }

  // عند الضغط على تم
  confirmBtn.addEventListener('click', () => {
    updateSecondScreen();
    screen1.classList.add('hidden');
    screen2.classList.remove('hidden');
  });

  // رجوع للشاشة الأولى
  cancelBtn.addEventListener('click', () => {
    screen2.classList.add('hidden');
    screen1.classList.remove('hidden');
  });

  // محاكاة الإرسال
  sendBtn.addEventListener('click', () => {
    let phone = phoneInput.value.trim() || "الرقم غير مدخل";
    alert(`✅ تم إرسال تحويل إلى ${phone}`);
  });
</script>
</body>
</html>
